name: CI

on:
  push:
    branches: ["**"]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv (with Python 3.12)
        uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install package and test deps (uv)
        run: |
          uv venv
          uv pip install -e .
          uv pip install pytest
          uv run pytest -q


